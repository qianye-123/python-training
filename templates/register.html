{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto">
    <h2 class="text-center mb-4">用户注册</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="nickname" class="form-label">昵称</label>
            <input type="text" class="form-control" id="nickname" name="nickname" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">密码（至少6位）</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <div class="mb-3">
            <label for="family_role" class="form-label">家庭身份</label>
            <select class="form-select" id="family_role" name="family_role" required>
                <option value="爸爸">爸爸</option>
                <option value="妈妈">妈妈</option>
                <option value="孩子">孩子</option>
                <option value="长辈">长辈</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">忌口食材（多选）</label>
            <div class="row">
                {% for taboo in ['辣椒', '海鲜', '芒果', '乳糖', '花生', '坚果', '鸡蛋'] %}
                <div class="col-md-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="taboos" value="{{ taboo }}" id="taboo_{{ taboo }}">
                        <label class="form-check-label" for="taboo_{{ taboo }}">{{ taboo }}</label>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
        <div class="mb-3">
            <label for="custom_taboo" class="form-label">自定义忌口食材</label>
            <input type="text" class="form-control" id="custom_taboo" name="custom_taboo" placeholder="输入其他忌口食材">
        </div>
        <button type="submit" class="btn btn-primary w-100">注册</button>
    </form>
    <p class="text-center mt-3">已有账号？<a href="{% url 'login' %}">立即登录</a></p>
</div>
{% endblock %}
