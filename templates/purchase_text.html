{% extends 'base.html' %}

{% block content %}
<h2>采购清单</h2>

<div class="card">
    <div class="card-body">
        <pre class="font-mono text-lg">{{ purchase_text }}</pre>
    </div>
</div>

<div class="mt-4">
    <button class="btn btn-primary" onclick="copyText()">复制文本</button>
    <a href="{% url 'summary' %}" class="btn btn-outline-primary">返回汇总</a>
    <a href="{% url 'cart' %}" class="btn btn-outline-secondary">返回清单</a>
</div>

<script>
function copyText() {
    const text = `{{ purchase_text }}`;
    navigator.clipboard.writeText(text).then(() => {
        alert('已复制到剪贴板');
    });
}
</script>
{% endblock %}
