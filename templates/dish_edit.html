{% extends 'base.html' %}

{% block content %}
<h2>编辑菜品</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="mb-3">
        <label for="name" class="form-label">菜品名称</label>
        <input type="text" class="form-control" id="name" name="name" value="{{ dish.name }}" required>
    </div>
    <div class="mb-3">
        <label for="category" class="form-label">分类</label>
        <select class="form-select" id="category" name="category" required>
            {% for cat in categories %}
            <option value="{{ cat }}" {% if dish.category == cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="image" class="form-label">菜品图片</label>
        <input type="file" class="form-control" id="image" name="image">
        {% if dish.image %}
        <p class="mt-2">当前图片: {{ dish.image }}</p>
        {% endif %}
    </div>
    <div class="mb-3">
        <label for="desc" class="form-label">菜品描述</label>
        <textarea class="form-control" id="desc" name="desc" rows="3">{{ dish.desc }}</textarea>
    </div>
    <div class="mb-3">
        <h4>食材列表</h4>
        <div id="material-fields">
            {% for dm in dish_materials %}
            <div class="row mb-2">
                <div class="col-md-4">
                    <select class="form-select" name="material_id">
                        {% for m in materials %}
                        <option value="{{ m.id }}" {% if dm.material.id == m.id %}selected{% endif %}>{{ m.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="number" class="form-control" name="need_num" value="{{ dm.need_num }}" step="0.1">
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="unit">
                        {% for u in ['斤', '个', '颗', '盒', '把'] %}
                        <option value="{{ u }}" {% if dm.unit == u %}selected{% endif %}>{{ u }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="button" class="btn btn-danger" onclick="removeField(this)">删除</button>
                </div>
            </div>
            {% endfor %}
        </div>
        <button type="button" class="btn btn-outline-secondary" onclick="addField()">添加食材</button>
    </div>
    <button type="submit" class="btn btn-primary">保存</button>
</form>
{% endblock %}

{% block scripts %}
<script>
function addField() {
    const container = document.getElementById('material-fields');
    const row = document.createElement('div');
    row.className = 'row mb-2';
    row.innerHTML = `
        <div class="col-md-4">
            <select class="form-select" name="material_id">
                {% for m in materials %}
                <option value="{{ m.id }}">{{ m.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3">
            <input type="number" class="form-control" name="need_num" placeholder="数量" step="0.1">
        </div>
        <div class="col-md-3">
            <select class="form-select" name="unit">
                <option value="斤">斤</option>
                <option value="个">个</option>
                <option value="颗">颗</option>
                <option value="盒">盒</option>
                <option value="把">把</option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="button" class="btn btn-danger" onclick="removeField(this)">删除</button>
        </div>
    `;
    container.appendChild(row);
}
function removeField(btn) {
    btn.parentElement.parentElement.remove();
}
</script>
{% endblock %}
