{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>食材价格管理</h2>
    {% if user.is_authenticated %}
    <a href="{% url 'price_add' %}" class="btn btn-primary">录入价格</a>
    {% endif %}
</div>

<div class="mb-4">
    <form method="get">
        <select class="form-select w-auto" name="material_id" onchange="this.form.submit()">
            <option value="">全部食材</option>
            {% for m in materials %}
            <option value="{{ m.id }}" {% if selected_material.id == m.id %}selected{% endif %}>{{ m.name }}</option>
            {% endfor %}
        </select>
    </form>
</div>

<table class="table">
    <thead>
        <tr>
            <th>菜市场</th>
            <th>食材</th>
            <th>单价</th>
            <th>更新日期</th>
        </tr>
    </thead>
    <tbody>
        {% for price in prices %}
        <tr>
            <td>{{ price.market.market_name }}</td>
            <td>{{ price.material.name }}</td>
            <td>¥{{ price.price }}</td>
            <td>{{ price.update_date }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="4" class="text-center text-muted">暂无价格信息</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
