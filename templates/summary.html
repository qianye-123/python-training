{% extends 'base.html' %}

{% block content %}
<h2>食材汇总（已扣除库存）</h2>

<div class="mb-6">
    <h3>待采购食材</h3>
    {% if material_needs %}
    <table class="table">
        <thead>
            <tr>
                <th>食材名称</th>
                <th>所需数量</th>
                <th>单位</th>
            </tr>
        </thead>
        <tbody>
            {% for m in material_needs %}
            <tr>
                <td>{{ m.name }}</td>
                <td>{{ m.total_need }}</td>
                <td>{{ m.unit }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <div class="alert alert-success">所有食材库存充足，无需采购！</div>
    {% endif %}
</div>

<div class="mb-6">
    <h3>选择菜市场计算花费</h3>
    <form method="post" action="{% url 'calculate_cost' %}">
        {% csrf_token %}
        <div class="mb-3">
            <label for="market_id" class="form-label">选择菜市场</label>
            <select class="form-select" id="market_id" name="market_id" required>
                {% for market in markets %}
                <option value="{{ market.market_name }}">{{ market.market_name }} ({{ market.area }})</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary">计算花费</button>
    </form>
</div>

<div class="d-flex gap-3">
    <a href="{% url 'cart' %}" class="btn btn-outline-primary">返回清单</a>
    <a href="{% url 'generate_purchase_text' %}" class="btn btn-primary">生成采购文本</a>
</div>
{% endblock %}
