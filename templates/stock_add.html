{% extends 'base.html' %}

{% block content %}
<h2>添加库存</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="material_id" class="form-label">选择食材</label>
        <select class="form-select" id="material_id" name="material_id" required>
            {% for m in materials %}
            <option value="{{ m.id }}">{{ m.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="stock_num" class="form-label">剩余库存数量</label>
        <input type="number" class="form-control" id="stock_num" name="stock_num" step="0.1" required>
    </div>
    <div class="mb-3">
        <label for="tip" class="form-label">过期备注</label>
        <input type="text" class="form-control" id="tip" name="tip" placeholder="如：临近过期">
    </div>
    <button type="submit" class="btn btn-primary">保存</button>
</form>
{% endblock %}
