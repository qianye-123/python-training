{% extends 'base.html' %}

{% block content %}
<h2>编辑水果</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="mb-3">
        <label for="name" class="form-label">水果名称</label>
        <input type="text" class="form-control" id="name" name="name" value="{{ fruit.name }}" required>
    </div>
    <div class="mb-3">
        <label for="image" class="form-label">水果图片</label>
        <input type="file" class="form-control" id="image" name="image">
        {% if fruit.image %}
        <p class="mt-2">当前图片: {{ fruit.image }}</p>
        {% endif %}
    </div>
    <div class="mb-3">
        <label for="store_tip" class="form-label">储存建议</label>
        <textarea class="form-control" id="store_tip" name="store_tip" rows="3">{{ fruit.store_tip }}</textarea>
    </div>
    <div class="mb-3">
        <label for="base_price" class="form-label">基础参考单价</label>
        <input type="number" class="form-control" id="base_price" name="base_price" step="0.1" value="{{ fruit.base_price }}" required>
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="is_allergy" name="is_allergy" {% if fruit.is_allergy %}checked{% endif %}>
        <label class="form-check-label" for="is_allergy">是否易过敏</label>
    </div>
    <button type="submit" class="btn btn-primary">保存</button>
</form>
{% endblock %}
