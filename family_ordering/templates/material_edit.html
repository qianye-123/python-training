{% extends 'base.html' %}

{% block content %}
<h2>编辑食材</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="name" class="form-label">食材名称</label>
        <input type="text" class="form-control" id="name" name="name" value="{{ material.name }}" required>
    </div>
    <div class="mb-3">
        <label for="type" class="form-label">分类</label>
        <select class="form-select" id="type" name="type" required>
            {% for t in types %}
            <option value="{{ t }}" {% if material.type == t %}selected{% endif %}>{{ t }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="season" class="form-label">季节</label>
        <select class="form-select" id="season" name="season" required>
            {% for s in seasons %}
            <option value="{{ s }}" {% if material.season == s %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-primary">保存</button>
</form>
{% endblock %}
