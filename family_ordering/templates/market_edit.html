{% extends 'base.html' %}

{% block content %}
<h2>编辑菜市场</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="area" class="form-label">所属地区</label>
        <input type="text" class="form-control" id="area" name="area" value="{{ market.area }}" required>
    </div>
    <div class="mb-3">
        <label for="market_name" class="form-label">菜市场名称</label>
        <input type="text" class="form-control" id="market_name" name="market_name" value="{{ market.market_name }}" required>
    </div>
    <div class="mb-3">
        <label for="address" class="form-label">详细地址</label>
        <textarea class="form-control" id="address" name="address" rows="3">{{ market.address }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">保存</button>
</form>
{% endblock %}
