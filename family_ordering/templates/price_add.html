{% extends 'base.html' %}

{% block content %}
<h2>录入食材价格</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="market_id" class="form-label">选择菜市场</label>
        <select class="form-select" id="market_id" name="market_id" required>
            {% for market in markets %}
            <option value="{{ market.id }}">{{ market.market_name }} ({{ market.area }})</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="material_id" class="form-label">选择食材</label>
        <select class="form-select" id="material_id" name="material_id" required>
            {% for m in materials %}
            <option value="{{ m.id }}">{{ m.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="price" class="form-label">当日零售单价</label>
        <input type="number" class="form-control" id="price" name="price" step="0.01" required>
    </div>
    <button type="submit" class="btn btn-primary">保存</button>
</form>
{% endblock %}
