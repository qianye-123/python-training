家味——家庭智能点餐与食材采购核算系统
完整标准化需求规格说明书（无歧义、细节全覆盖、可直接用于开发部署）
文档版本：V1.0
适用技术栈
后端：Python3.10 + Django4.2 数据库：MySQL8.0 前端：Django原生模板 + Bootstrap5 响应式页面（手机/电脑自适应） 文件存储：项目media文件夹本地存储菜品、水果图片 第三方接口：阿里云通义大模型API（AI智能配餐）
一、项目概述
1.1 项目名称
家味 —— 家庭智能点餐与食材采购核算系统
1.2 开发目标
解决家庭日常饮食全流程痛点：不清楚做菜所需食材、多道菜食材重复统计麻烦、购买食材无比价渠道、家人忌口/过敏食材容易误点、不清楚应季平价食材、三餐开销无记录、每日纠结菜谱。 系统一站式实现：菜品/水果/饮品管理、点餐自动汇总采购清单、菜市场比价、忌口食材全流程提醒过滤、时令食材展示、AI自动搭配三餐、月度餐饮消费统计、家庭食材库存管理。
1.3 使用人群
全体家庭成员，无管理员、普通用户权限区分；所有登录用户拥有完全一致增删改查权限。 未登录访客仅开放菜品浏览功能，禁止点餐、录入数据、查看市场价格。
1.4 术语统一规范（开发无歧义）
1.忌口食材：用户个人不吃、过敏、饮食禁忌类食材（辣椒、海鲜、芒果、乳糖等）
2.时令食材：分春、夏、秋、冬四季平价食材，全年通用食材单独分类
3.采购清单：勾选点餐商品后，系统自动合并同类食材总量，扣除家中现有库存，生成外出采购物料文本
4.用餐时段：固定四类：早餐、午餐、晚餐、加餐
5.市场价：不同菜市场内单一食材当日零售单价，支持每日更新录入
6.库存：家中现有未消耗食材剩余数量，可标注临近过期提醒优先食用
7.订单：用户提交点餐清单后生成归档记录，包含消费金额、采购清单、下单时间、采购完成状态
二、功能性需求（分模块，每条功能明确输入输出）
模块1：家庭成员用户管理模块
1.1 用户注册
1.页面输入项：昵称（登录唯一账号，不可重复）、登录密码、家庭身份（下拉选择：爸爸/妈妈/孩子/长辈）、自定义忌口食材（多选预设食材+手动输入自定义忌口）
2.校验规则：昵称不可重复；密码长度≥6位；忌口食材至少可选择1项或自定义添加
3.执行逻辑：表单提交完成数据入库，自动跳转首页并保持登录状态，自动生成该用户专属忌口清单
1.2 用户登录
1.登录表单：昵称+密码，提供「记住登录状态」复选框
2.错误提示：昵称不存在、密码错误分别给出对应文字提示
3.访问限制：未登录用户无法进入点餐、库存、价格录入、消费统计页面
1.3 个人中心
1.基础信息修改：可修改昵称、重置登录密码，提交后实时更新数据库
2.忌口管理：新增忌口食材、删除已有忌口食材、修改忌口清单，实时同步全家公共忌口池
3.数据查看：展示本人全部历史点餐订单；展示个人收藏菜品；统计高频点餐菜品并排序展示
1.4 权限约束
1.登录用户：系统全部页面、全部增删改查功能无限制
2.访客（未登录）：仅可浏览菜品/水果/饮品基础展示页面，隐藏价格、点餐按钮、录入按钮、统计页面入口
模块2：全品类商品库管理模块（所有登录用户均可操作）
2.1 正餐菜品管理
1.新增菜品录入字段
基础信息：菜品名称、菜品分类（素菜/荤菜/汤品/凉菜/小吃）、上传菜品图片、菜品描述（口味、简易制作步骤）
食材绑定：多选食材列表，每类食材填写所需数量、单位（斤/个/颗/盒/把）
2.菜品操作：编辑全部信息、删除菜品、收藏菜品
3.菜品详情页展示：菜品大图、完整做法、全部所需食材及对应用量
4.自动警示逻辑：若菜品包含任意家庭成员忌口食材，页面顶部红色醒目弹窗提示风险
2.2 水果管理
1.录入字段：水果名称、上传图片、储存建议、单人参考食用量、基础单价、是否易过敏（是/否）
2.过滤规则：标记为易过敏的水果，有对应忌口用户浏览时弹出红色提醒
3.支持编辑、删除、收藏
2.3 饮品管理
覆盖品类：豆浆、纯牛奶、酸奶、咖啡、果汁、碳酸饮料、花茶、奶茶
1.录入字段：饮品名称、规格、单品售价、是否含乳糖（是/否）
2.过滤规则：含乳糖饮品，乳糖忌口用户浏览页面自动弹窗提醒
3.支持编辑、删除、收藏
模块3：忌口过滤提醒核心系统（贯穿全系统，优先级最高）
1.全家公共忌口池：系统实时自动汇总所有登录用户的忌口食材，生成统一过滤库
2.商品浏览过滤：打开菜品/水果/饮品详情，包含忌口食材则顶部红色弹窗提示
3.AI推荐过滤：智能配餐接口返回结果时，直接剔除所有含忌口食材的菜品，不推送风险餐食
4.点餐二次校验：将商品加入点餐清单时，再次弹窗确认，杜绝误点过敏食材
5.筛选功能：页面增加筛选按钮，可筛选「适合指定家人」「无任何忌口食材」两类商品
模块4：AI智能一日三餐推荐模块
1.接口配置：内置阿里云大模型固定密钥sk-1e10a276e3194e79a431a625ab419384，无需用户手动配置
2.入参自动携带：全家忌口清单、家中现有库存食材、当前季节时令食材、无固定预算限制
3.输出内容：完整早餐+午餐+晚餐搭配方案，附带整套三餐所需全部食材预览清单
4.联动功能：推荐菜品可一键批量加入点餐清单，自动带入用餐时段
模块5：点餐核心业务模块
1.分类切换：菜肴专区、水果专区、饮品专区Tab切换浏览
2.单品详情：展示食材用量、忌口警示、参考单价、收藏按钮
3.加入点餐清单操作：选择用餐时段、自定义购买份数，支持单商品删除
4.食材聚合逻辑：点击汇总按钮，系统自动合并清单内同类食材，累加总需求量
5.采购清单生成：一键生成纯文本清单，支持复制文本，适配手机页面简洁展示
6.清单重置：一键清空当前全部点餐商品，清空后无缓存残留
模块6：菜市场价格查询与比价模块
6.1 菜市场基础管理
所有登录用户可新增、编辑、删除菜市场信息，录入字段：所属地区、市场名称、详细地址
6.2 食材价格录入
为每一种食材录入不同菜市场当日零售单价，每次录入自动记录更新日期，支持每日修改更新
6.3 计价与比价功能
1.选中目标菜市场后，系统根据点餐清单食材总量自动计算总采购花费
2.同一食材横向展示全部菜市场录入单价，最低价格高亮标绿
3.价格波动提示：对比历史录入价格，涨价标红、降价标绿
模块7：家庭食材库存管理
1.库存录入：选择食材、填写剩余库存数量、添加备注（临近过期/正常），保存更新时间
2.采购自动抵扣：生成待采购清单时，自动用库存数量抵消食材总需求，仅展示需要外出采购的食材
3.AI联动：AI配餐优先推荐库存充足食材，减少重复采购浪费
4.库存编辑、删除：支持随时修改剩余数量、修改过期备注
模块8：时令食材管理
1.食材季节标签维护：可给食材绑定春/夏/秋/冬/全年标签，全员可增删改
2.首页展示：当前季节时令食材置顶展示，附带营养说明
3.反季标记：非当前季节食材标注灰色提示，建议减少采购
4.AI配餐优先级：同等条件下优先推荐当季时令食材
模块9：消费统计台账管理
1.分时段消费拆分：单独统计早餐、午餐、晚餐、加餐花费
2.分类费用拆分：食材采购成本、水果开销、饮品开销分开展示
3.订单归档：提交点餐订单永久保存，记录下单人、下单日期、总花费、完整采购文本
4.月度统计：自动汇总当月全部餐饮总支出，表格展示每日消费明细
5.订单状态：支持手动标记「未采购」「已采购」，区分待办与完成订单
模块10：附加拓展功能
1.菜品收藏：任意商品点击收藏，个人中心统一展示，首页快速入口一键点餐
2.极简采购清单：去除多余文字，适配手机小尺寸屏幕查看
3.食材科普：时令食材附带营养价值、适合食用人群文字说明
4.高频菜品统计：统计家庭近30天点餐频次，从高到低排序，支持快速复点
