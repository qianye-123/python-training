四、完整业务执行流程（线性无歧义）
1.用户打开网站，完成注册，填写家庭身份与个人忌口食材，自动登录；
2.任意登录用户录入基础数据：
录入菜品、水果、饮品，并绑定对应食材用量；
录入周边菜市场信息，每日更新各类食材市场单价；
给食材绑定四季时令标签；
登记家中现有食材库存，填写过期备注；
3.用户首页浏览当前季节时令食材，两种点餐方式可选： 方式A：点击AI智能推荐，系统自动过滤全家忌口、优先使用库存与时令食材，生成一日三餐，一键加入点餐清单； 方式B：手动浏览菜品/水果/饮品，自选商品，选择用餐时段、填写购买份数加入清单；
4.清单页面点击汇总，系统自动合并同类食材总量，扣除家中现有库存，生成待采购清单；
5.选择目标菜市场，系统自动计算本次采购总花费，多市场横向比价，一键复制极简采购文本；
6.提交订单完成归档，记录消费数据；采购完成后手动将订单标记为「已采购」；
7.用户随时可查看历史订单、月度餐饮支出统计，维护菜品、库存、市场价格、个人忌口清单。
五、非功能性需求（开发部署硬性约束）
1.权限约束：无管理员角色，所有登录用户权限完全平等；页面操作简单，老人、青少年均可快速上手；
2.前端适配：全部页面采用Bootstrap5响应式布局，手机浏览器正常展示采购清单，无布局错乱；
3.数据持久化：MySQL持久存储全部业务数据，图片统一存放项目media文件夹，重启服务数据不丢失；
4.易用性约束：新增菜品、录入价格、点餐流程步骤精简，单功能页面操作不超过3步；
5.拓展预留：代码预留AI接口、生鲜价格第三方接口拓展位置，后期可迭代升级；
6.性能约束：家庭小规模数据场景，页面加载无明显延迟，统计、多表联查运算流畅；
7.线上部署约束：线上DEBUG=False，ALLOWED_HOSTS=["*"]，线上数据库使用平台独立MySQL，禁止使用本地127.0.0.1数据库地址。
六、课程开发简化方案（可选，降低开发难度，不改动需求逻辑）
1.AI推荐简化：不调用阿里云API，仅后端逻辑筛选时令、库存、无忌口菜品自动搭配三餐；
2.价格录入简化：取消自动同步价格功能，全部手动录入菜市场单价；
3.前端简化：不使用Vue/Ajax复杂异步交互，全部使用Django模板表单提交；
4.统计可视化：消费统计增加图表展示（柱状图/折线图展示每日、月度开销）；
5.文件存储：仅使用本地media文件夹存储图片，不接入阿里云/腾讯云对象存储。
七、项目核心亮点（用于作业文档结尾）
1.无管理员权限设计，全家成员均可独立维护全部数据，无需专人管理；
2.全链路忌口过滤提醒，浏览、推荐、点餐三重校验，杜绝过敏食材误点；
3.自动聚合食材清单+库存抵扣，精准计算需要外出采购的物料，减少食材浪费；
